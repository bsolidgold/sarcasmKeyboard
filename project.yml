name: SarcasmKeyboard
options:
  bundleIdPrefix: com.sarcasmkeyboard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SarcasmKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  SarcasmKeyboard:
    type: application
    platform: iOS
    sources:
      - path: SarcasmKeyboard
    dependencies:
      - target: SarcasmKeyboardExtension
        embed: true
      - package: SarcasmKit
    info:
      path: SarcasmKeyboard/Info.plist
      properties:
        CFBundleDisplayName: SarcasmKeyboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sarcasmkeyboard.app
        CODE_SIGN_ENTITLEMENTS: SarcasmKeyboard/SarcasmKeyboard.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      storeKitConfiguration: SarcasmKeyboard/Store/Products.storekit

  SarcasmKeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SarcasmKeyboardExtension
    dependencies:
      - package: SarcasmKit
    info:
      path: SarcasmKeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: Sarcasm Keyboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: false
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sarcasmkeyboard.app.keyboard
        CODE_SIGN_ENTITLEMENTS: SarcasmKeyboardExtension/SarcasmKeyboardExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
